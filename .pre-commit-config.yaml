repos:
  - repo: local
    hooks:
      - id: git-secrets
        name: git-secrets
        language: system
        entry: git-secrets --scan
        pass_filenames: false

      - id: chezmoi-drift
        name: Check chezmoi drift
        language: system
        entry: bash -c 'output=$(chezmoi status 2>&1); if [ -n "$output" ]; then echo "Chezmoi drift detected:"; echo "$output"; exit 1; fi'
        pass_filenames: false
        always_run: true


  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        args: ['--config=.gitleaks.toml']



  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: check-symlinks
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.3.1
    hooks:
      - id: stylua
